<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Página no encontrada | Cirujana Digital</title>

    <style>
      :root {
        --font-display: Georgia, 'Times New Roman', serif;
        --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-body);
        background: linear-gradient(135deg, #0d1b2a 0%, #03658c 100%);
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .container-404 {
        text-align: center;
        max-width: 600px;
      }

      .error-code {
        font-family: 'Raleway', sans-serif;
        font-size: clamp(6rem, 15vw, 12rem);
        font-weight: 800;
        background: linear-gradient(135deg, #00a7a9, #7fdbff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 1rem;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }

      h1 {
        font-family: var(--font-display);
        font-weight: 400;
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        margin-bottom: 1rem;
      }

      p {
        font-size: 1.2rem;
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 2rem;
        line-height: 1.6;
      }

      .btn-group {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 1rem 2rem;
        background: linear-gradient(135deg, #03658c, #00a7a9);
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        transition: all 0.3s ease;
        border: 2px solid transparent;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 167, 169, 0.4);
      }

      .btn-secondary {
        background: transparent;
        border: 2px solid rgba(255, 255, 255, 0.3);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: #00a7a9;
      }

      .emoji {
        font-size: 4rem;
        margin-bottom: 1rem;
        display: inline-block;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      @media (max-width: 480px) {
        .btn-group {
          flex-direction: column;
          width: 100%;
        }

        .btn {
          width: 100%;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="container-404">
      <div class="emoji">🔍</div>
      <div class="error-code">404</div>
      <h1>Página no encontrada</h1>
      <p>
        Lo siento, la página que buscas no existe o fue movida. No te preocupes, puedo ayudarte a
        encontrar lo que necesitas.
      </p>
      <div class="btn-group">
        <a href="/" class="btn">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path
              d="M3 10l7-7 7 7M5 8v9h3v-5h4v5h3V8"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          Vuelve al inicio
        </a>
        <a href="/#contacto" class="btn btn-secondary">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path
              d="M3 7l6.5 4.5L16 7M4 6h12a1 1 0 011 1v8a1 1 0 01-1 1H4a1 1 0 01-1-1V7a1 1 0 011-1z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
          Contactarme
        </a>
      </div>
    </div>
  </body>
</html>
